services:
  - type: web
    name: branchfusionnet-api
    env: python
    plan: starter  # You can upgrade to standard or pro for more resources
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /predict_disease/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: PORT
        value: 10000
      - key: WEB_CONCURRENCY
        value: 1
      - key: MAX_WORKERS
        value: 1
    disk:
      name: model-storage
      mountPath: /opt/render/project/src/model
      sizeGB: 5  # Adjust based on your model size
    autoDeploy: true
    branch: main
    rootDir: .
    dockerfilePath: ""
    runtime: python3
    scaling:
      minInstances: 1
      maxInstances: 3
    region: singapore  # Choose: singapore
    
