name: TFLite Model Converter

on:
  workflow_dispatch:
    inputs:
      model_path:
        description: "Path to the input model file"
        required: true
        default: "model/MultiBranchFusionNet-0.keras"
      output_path:
        description: "Path to the saved TFLite model file"
        required: true
        default: "model/MultiBranchFusionNet-0.tflite"
  push:
    paths:
      - "model/**"
      - "src/tflite_converter.py"

jobs:
  convert-model:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: pip install tensorflow==2.18.0
    
    - name: Convert model and show info
      run: |
        python -c "
        import sys
        import os
        import tensorflow as tf
        sys.path.append('src')
        from tflite_converter import convert_model_to_tflite
        
        keras_path = '${{ github.event.inputs.model_path || 'model/MultiBranchFusionNet-0.keras' }}'
        tflite_path = '${{ github.event.inputs.output_path || 'model/MultiBranchFusionNet-0.tflite' }}'
        
        if not os.path.exists(keras_path):
            print(f'Model not found: {keras_path}')
            sys.exit(1)
        
        # Convert model
        result = convert_model_to_tflite(keras_path, tflite_path)
        
        if result == False:
            print('Conversion failed')
            sys.exit(1)
        
        # Show model info if conversion successful
        if os.path.exists(tflite_path):
            interpreter = tf.lite.Interpreter(model_path=tflite_path)
            interpreter.allocate_tensors()
            
            input_details = interpreter.get_input_details()
            output_details = interpreter.get_output_details()
            size_mb = os.path.getsize(tflite_path) / 1024 / 1024
            
            print(f'✅ Conversion successful!')
            print(f'Model: {tflite_path}')
            print(f'Size: {size_mb:.1f} MB')
            print(f'Input: {input_details[0][\"shape\"].tolist()}')
            print(f'Output: {output_details[0][\"shape\"].tolist()}')
        else:
            print('❌ TFLite model not created')
            sys.exit(1)
        "
    
    - name: Upload model
      uses: actions/upload-artifact@v4
      with:
        name: tflite-model
        path: ${{ github.event.inputs.output_path || 'model/MultiBranchFusionNet-0.tflite' }}