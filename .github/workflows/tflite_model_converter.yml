name: TFLite Model Converter

on:
  workflow_dispatch:
    inputs:
      model_path:
        description: "Path to the input model file"
        required: true
        default: "model/MultiBranchFusionNet-0.keras"
      output_path:
        description: "Path to the saved TFLite model file"
        required: true
        default: "model/MultiBranchFusionNet-0.tflite"
  push:
    paths:
      - "model/**"
      - "src/tflite_converter.py"

jobs:
  convert-model:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install tensorflow==2.18.0
        pip install ai-edge-litert
    
    - name: Run TFLite converter
      run: |
        python -c "
        import sys
        import os
        sys.path.append('src')
        from tflite_converter import convert_model_to_tflite
        
        keras_path = '${{ github.event.inputs.model_path || 'model/MultiBranchFusionNet-0.keras' }}'
        tflite_path = '${{ github.event.inputs.output_path || 'model/MultiBranchFusionNet-0.tflite' }}'
        
        if not os.path.exists(keras_path):
            print(f'Model not found: {keras_path}')
            sys.exit(1)
        
        print(f'Starting conversion: {keras_path} -> {tflite_path}')
        success = convert_model_to_tflite(keras_path, tflite_path)
        
        if not success:
            print('❌ Conversion failed')
            sys.exit(1)
        
        print('🎉 Conversion completed successfully')
        "
    
    - name: Upload model
      uses: actions/upload-artifact@v4
      with:
        name: tflite-model
        path: ${{ github.event.inputs.output_path || 'model/MultiBranchFusionNet-0.tflite' }}